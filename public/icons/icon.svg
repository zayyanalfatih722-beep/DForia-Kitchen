    <path d="M 100 136 L 145 136" fill="none" stroke="url(#gold)" stroke-width="16" stroke-linecap="round" />
    <path d="M 100 80 L 100 190" fill="none" stroke="url(#gold)" stroke-width="16" stroke-linecap="round" />
